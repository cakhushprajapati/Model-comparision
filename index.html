<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anaplan Model Comparator</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@400;600;700;800&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root {
  --bg:#0a0c10; --surface:#111318; --surface2:#181c24; --border:#1f2533; --border2:#252d3d;
  --accent:#3b82f6; --accent2:#60a5fa; --accent-glow:rgba(59,130,246,0.18);
  --green:#22d3a4; --green-glow:rgba(34,211,164,0.12);
  --amber:#f59e0b; --amber-glow:rgba(245,158,11,0.12);
  --red:#f87171; --red-glow:rgba(248,113,113,0.12);
  --purple:#a78bfa; --purple-glow:rgba(167,139,250,0.1);
  --text:#e2e8f0; --muted:#64748b; --muted2:#475569;
  --font-display:'Syne',sans-serif; --font-mono:'DM Mono',monospace; --font-body:'Inter',sans-serif;
  --a:#3b82f6; --b:#22d3a4;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{background:var(--bg);color:var(--text);font-family:var(--font-body);min-height:100vh;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:48px 48px;opacity:.3;pointer-events:none;z-index:0;}

/* ── LAYOUT ── */
.shell{max-width:1400px;margin:0 auto;padding:32px 32px 64px;position:relative;z-index:1;}
.topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:32px;flex-wrap:wrap;gap:12px;}
.logo{display:flex;align-items:center;gap:12px;}
.logo-icon{width:38px;height:38px;background:linear-gradient(135deg,var(--accent),var(--purple));border-radius:9px;display:flex;align-items:center;justify-content:center;font-family:var(--font-mono);font-size:11px;font-weight:500;color:#fff;flex-shrink:0;}
.logo-text{font-family:var(--font-display);font-size:16px;font-weight:700;}
.logo-sub{font-family:var(--font-mono);font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;}
.version-badge{font-family:var(--font-mono);font-size:11px;padding:4px 12px;border-radius:20px;background:var(--accent-glow);border:1px solid rgba(59,130,246,0.25);color:var(--accent2);}

/* ── UPLOAD AREA ── */
.upload-grid{display:grid;grid-template-columns:1fr auto 1fr;gap:0;margin-bottom:28px;align-items:stretch;}
.upload-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:28px;display:flex;flex-direction:column;gap:14px;}
.upload-card.loaded{border-color:rgba(59,130,246,0.35);background:rgba(59,130,246,0.04);}
.upload-card.loaded-b{border-color:rgba(34,211,164,0.35);background:rgba(34,211,164,0.04);}
.upload-header{display:flex;align-items:center;gap:10px;}
.model-label{font-family:var(--font-mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;padding:3px 10px;border-radius:4px;}
.model-label.a{background:rgba(59,130,246,0.15);color:var(--accent2);border:1px solid rgba(59,130,246,0.3);}
.model-label.b{background:rgba(34,211,164,0.15);color:var(--green);border:1px solid rgba(34,211,164,0.3);}
.upload-title{font-family:var(--font-display);font-size:15px;font-weight:700;}
.upload-zone{border:1.5px dashed var(--border2);border-radius:10px;padding:22px;text-align:center;cursor:pointer;transition:all .2s;display:flex;flex-direction:column;align-items:center;gap:8px;}
.upload-zone:hover{border-color:var(--accent);background:var(--accent-glow);}
.upload-zone.zone-b:hover{border-color:var(--green);background:var(--green-glow);}
.upload-zone svg{opacity:.5;}
.upload-zone-text{font-family:var(--font-mono);font-size:11px;color:var(--muted);}
.file-chip{display:inline-flex;align-items:center;gap:7px;border-radius:99px;padding:5px 13px 5px 9px;font-family:var(--font-mono);font-size:11px;}
.chip-a{background:rgba(59,130,246,0.1);border:1px solid rgba(59,130,246,0.3);color:var(--accent2);}
.chip-b{background:rgba(34,211,164,0.1);border:1px solid rgba(34,211,164,0.3);color:var(--green);}
.chip-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
.sheet-sel{background:var(--surface2);border:1px solid var(--border2);border-radius:6px;padding:6px 10px;font-family:var(--font-mono);font-size:12px;color:var(--text);outline:none;width:100%;}
.upload-meta{font-family:var(--font-mono);font-size:11px;color:var(--muted);display:flex;flex-direction:column;gap:4px;}
.meta-row{display:flex;justify-content:space-between;}

.vs-divider{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:0 20px;gap:8px;}
.vs-circle{width:44px;height:44px;border-radius:50%;background:var(--surface2);border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;font-family:var(--font-display);font-size:13px;font-weight:800;color:var(--muted);}
.vs-line{flex:1;width:1px;background:var(--border);min-height:20px;}

/* ── RUN BUTTON ── */
.run-bar{display:flex;justify-content:center;margin-bottom:28px;}
.run-btn{background:linear-gradient(135deg,var(--accent),var(--purple));color:#fff;border:none;border-radius:10px;padding:12px 36px;font-family:var(--font-mono);font-size:13px;font-weight:500;cursor:pointer;letter-spacing:.04em;transition:opacity .2s,transform .2s;display:flex;align-items:center;gap:8px;}
.run-btn:hover{opacity:.88;transform:translateY(-1px);}
.run-btn:disabled{opacity:.4;cursor:not-allowed;transform:none;}

/* ── KPI STRIP ── */
.kpi-strip{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:24px;}
.kpi-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:18px 16px;}
.kpi-label{font-family:var(--font-mono);font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted2);margin-bottom:6px;}
.kpi-val{font-family:var(--font-display);font-size:22px;font-weight:700;line-height:1;margin-bottom:4px;}
.kpi-sub{font-family:var(--font-mono);font-size:10px;color:var(--muted);}
.kpi-val.green{color:var(--green);}
.kpi-val.red{color:var(--red);}
.kpi-val.amber{color:var(--amber);}
.kpi-val.blue{color:var(--accent2);}
.kpi-val.purple{color:var(--purple);}

/* ── TABS ── */
.tabs{display:flex;gap:4px;margin-bottom:20px;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:5px;}
.tab{font-family:var(--font-mono);font-size:12px;padding:8px 16px;border-radius:7px;cursor:pointer;color:var(--muted);border:none;background:transparent;transition:all .18s;display:flex;align-items:center;gap:6px;}
.tab:hover{color:var(--text);background:var(--surface2);}
.tab.active{background:var(--accent-glow);color:var(--accent2);border:1px solid rgba(59,130,246,.2);}
.tab-count{font-size:10px;padding:1px 6px;border-radius:3px;background:rgba(255,255,255,0.08);}

/* ── SECTION ── */
.section{background:var(--surface);border:1px solid var(--border);border-radius:14px;overflow:hidden;margin-bottom:20px;}
.sec-header{padding:14px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--surface2);flex-wrap:wrap;gap:8px;}
.sec-title{font-family:var(--font-display);font-size:14px;font-weight:700;display:flex;align-items:center;gap:8px;}
.sec-meta{font-family:var(--font-mono);font-size:11px;color:var(--muted);}

/* ── CHART ── */
.chart-wrap{padding:24px;}
.chart-canvas-wrap{position:relative;}
.bar-chart{display:flex;flex-direction:column;gap:6px;}
.bc-row{display:flex;align-items:center;gap:10px;}
.bc-label{font-family:var(--font-mono);font-size:10px;color:var(--muted);width:180px;flex-shrink:0;text-align:right;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.bc-bars{flex:1;display:flex;flex-direction:column;gap:3px;}
.bc-bar{height:10px;border-radius:3px;transition:width .8s cubic-bezier(.4,0,.2,1);min-width:2px;position:relative;}
.bc-bar-a{background:linear-gradient(90deg,#2563eb,var(--accent2));}
.bc-bar-b{background:linear-gradient(90deg,#059669,var(--green));}
.bc-val{font-family:var(--font-mono);font-size:9px;color:var(--muted);width:70px;flex-shrink:0;}

/* ── DELTA BAR ── */
.delta-bar-wrap{display:flex;align-items:center;gap:8px;height:16px;}
.delta-bar-neg,.delta-bar-pos{height:8px;border-radius:2px;transition:width .6s ease;}
.delta-bar-neg{background:var(--red);opacity:.8;}
.delta-bar-pos{background:var(--green);opacity:.8;}
.delta-center{width:1px;height:14px;background:var(--border2);flex-shrink:0;}

/* ── DIFF TABLE ── */
.diff-table{width:100%;border-collapse:collapse;font-size:12px;}
.diff-table th{padding:9px 14px;text-align:left;font-family:var(--font-mono);font-size:9px;color:var(--muted);letter-spacing:.08em;text-transform:uppercase;border-bottom:1px solid var(--border);background:var(--surface2);white-space:nowrap;}
.diff-table th.right{text-align:right;}
.diff-table td{padding:9px 14px;border-bottom:1px solid var(--border);vertical-align:middle;}
.diff-table tr:hover td{background:rgba(255,255,255,.02);}
.diff-table tr.row-added td:first-child{border-left:3px solid var(--green);}
.diff-table tr.row-removed td:first-child{border-left:3px solid var(--red);}
.diff-table tr.row-changed td:first-child{border-left:3px solid var(--amber);}
.diff-table tr.row-same td:first-child{border-left:3px solid var(--border2);}

/* ── BADGES ── */
.badge{display:inline-flex;align-items:center;font-family:var(--font-mono);font-size:10px;padding:2px 8px;border-radius:4px;white-space:nowrap;font-weight:500;}
.badge-added{background:rgba(34,211,164,.12);color:var(--green);border:1px solid rgba(34,211,164,.25);}
.badge-removed{background:rgba(248,113,113,.12);color:var(--red);border:1px solid rgba(248,113,113,.25);}
.badge-changed{background:rgba(245,158,11,.12);color:var(--amber);border:1px solid rgba(245,158,11,.25);}
.badge-same{background:rgba(100,116,139,.1);color:var(--muted);border:1px solid rgba(100,116,139,.2);}
.badge-xl{background:rgba(228,75,74,.15);color:#f87171;}
.badge-large{background:rgba(216,90,48,.15);color:#fb923c;}
.badge-medium{background:rgba(239,159,39,.15);color:#fbbf24;}
.badge-small{background:rgba(34,211,164,.12);color:#22d3a4;}

/* ── DELTA TEXT ── */
.delta-pos{color:var(--green);font-family:var(--font-mono);font-size:11px;}
.delta-neg{color:var(--red);font-family:var(--font-mono);font-size:11px;}
.delta-zero{color:var(--muted2);font-family:var(--font-mono);font-size:11px;}
.mono{font-family:var(--font-mono);font-size:11px;color:var(--muted);}
.mono-bright{font-family:var(--font-mono);font-size:11px;color:var(--text);}
.text-right{text-align:right;}

/* ── FILTER BAR ── */
.filter-bar{padding:10px 16px;border-bottom:1px solid var(--border);display:flex;gap:8px;flex-wrap:wrap;align-items:center;}
.filter-sel{background:var(--surface2);border:1px solid var(--border2);border-radius:6px;padding:5px 10px;font-family:var(--font-mono);font-size:11px;color:var(--text);outline:none;cursor:pointer;}
.filter-input{background:var(--surface2);border:1px solid var(--border2);border-radius:6px;padding:5px 10px;font-family:var(--font-mono);font-size:11px;color:var(--text);outline:none;width:200px;}
.filter-input::placeholder{color:var(--muted2);}

/* ── SUMMARY CARDS ── */
.summary-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;padding:20px;}
.sum-card{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:18px;}
.sum-card-title{font-family:var(--font-mono);font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted2);margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--border);}
.sum-row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;font-size:12px;}
.sum-row-label{color:var(--muted);}
.sum-row-val{font-family:var(--font-mono);font-size:11px;}

/* ── LEGEND ── */
.legend{display:flex;gap:16px;flex-wrap:wrap;font-family:var(--font-mono);font-size:11px;color:var(--muted);padding:10px 16px;border-top:1px solid var(--border);}
.leg-item{display:flex;align-items:center;gap:5px;}
.leg-dot{width:8px;height:8px;border-radius:2px;}

/* ── SIZE IMPACT BOX ── */
.impact-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;padding:20px;}
.impact-card{background:var(--surface2);border:1px solid var(--border);border-radius:10px;overflow:hidden;}
.impact-card-head{padding:10px 14px;display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--border);}
.impact-card-title{font-family:var(--font-mono);font-size:10px;text-transform:uppercase;letter-spacing:.08em;}
.impact-table{width:100%;border-collapse:collapse;}
.impact-table td{padding:7px 14px;border-bottom:1px solid var(--border);font-size:11px;vertical-align:middle;}
.impact-table td:last-child{text-align:right;font-family:var(--font-mono);}
.impact-table tr:last-child td{border-bottom:none;}
.impact-total{padding:8px 14px;display:flex;justify-content:space-between;border-top:1px solid var(--border2);font-family:var(--font-mono);font-size:12px;}

/* ── EMPTY / LOADING ── */
.empty{padding:40px;text-align:center;font-family:var(--font-mono);font-size:12px;color:var(--muted2);}
.progress-bar{height:2px;background:var(--border2);margin:0;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--purple));transition:width .3s;width:0%;}

/* ── VERSION MATRIX ── */
.version-matrix{padding:20px;overflow-x:auto;}
.vm-table{border-collapse:collapse;width:100%;}
.vm-table th{padding:8px 12px;font-family:var(--font-mono);font-size:9px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);border-bottom:1px solid var(--border);background:var(--surface2);white-space:nowrap;}
.vm-table td{padding:8px 12px;border-bottom:1px solid var(--border);font-size:11px;vertical-align:middle;}
.vm-cell-a{color:var(--accent2);font-family:var(--font-mono);font-size:10px;}
.vm-cell-b{color:var(--green);font-family:var(--font-mono);font-size:10px;}
.vm-cell-delta{font-family:var(--font-mono);font-size:10px;}

/* ── PAGINATION ── */
.pg-bar{padding:8px 16px;display:flex;align-items:center;gap:8px;font-family:var(--font-mono);font-size:11px;color:var(--muted);border-top:1px solid var(--border);}
.pg-btn{background:var(--surface2);border:1px solid var(--border2);border-radius:5px;padding:3px 10px;font-family:var(--font-mono);font-size:11px;color:var(--muted);cursor:pointer;}
.pg-btn:disabled{opacity:.35;cursor:not-allowed;}

@media(max-width:900px){.upload-grid{grid-template-columns:1fr;}.vs-divider{flex-direction:row;padding:10px 0;}.vs-line{height:1px;width:100%;min-height:unset;}.kpi-strip{grid-template-columns:repeat(2,1fr);}.summary-grid{grid-template-columns:1fr;}.impact-grid{grid-template-columns:1fr;}}
</style>
</head>
<body>
<div class="shell">

  <!-- TOPBAR -->
  <div class="topbar">
    <div class="logo">
      <div class="logo-icon">MC</div>
      <div>
        <div class="logo-text">Model Comparator</div>
        <div class="logo-sub">Anaplan · EPM Toolkit</div>
      </div>
    </div>
    <div class="version-badge">● Khush Prajapati · Polestar Analytics</div>
  </div>

  <!-- UPLOAD -->
  <div class="upload-grid">
    <!-- Model A -->
    <div class="upload-card" id="card-a">
      <div class="upload-header">
        <span class="model-label a">Model A</span>
        <span class="upload-title">Baseline / Before</span>
      </div>
      <label class="upload-zone" id="zone-a" for="file-a">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none"><path d="M12 15V3M12 3L8 7M12 3L16 7" stroke="#60a5fa" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/><path d="M3 20H21" stroke="#60a5fa" stroke-width="1.5" stroke-linecap="round"/></svg>
        <span class="upload-zone-text">Upload Model A export (.xlsx)</span>
        <input type="file" id="file-a" accept=".xlsx,.xls" style="display:none">
      </label>
      <div id="chip-a" style="display:none;"></div>
      <select id="sheet-a" class="sheet-sel" style="display:none;"></select>
      <div id="meta-a" class="upload-meta" style="display:none;"></div>
    </div>

    <!-- VS -->
    <div class="vs-divider">
      <div class="vs-line"></div>
      <div class="vs-circle">VS</div>
      <div class="vs-line"></div>
    </div>

    <!-- Model B -->
    <div class="upload-card" id="card-b">
      <div class="upload-header">
        <span class="model-label b">Model B</span>
        <span class="upload-title">Updated / After</span>
      </div>
      <label class="upload-zone zone-b" id="zone-b" for="file-b">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none"><path d="M12 15V3M12 3L8 7M12 3L16 7" stroke="#22d3a4" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/><path d="M3 20H21" stroke="#22d3a4" stroke-width="1.5" stroke-linecap="round"/></svg>
        <span class="upload-zone-text">Upload Model B export (.xlsx)</span>
        <input type="file" id="file-b" accept=".xlsx,.xls" style="display:none">
      </label>
      <div id="chip-b" style="display:none;"></div>
      <select id="sheet-b" class="sheet-sel" style="display:none;"></select>
      <div id="meta-b" class="upload-meta" style="display:none;"></div>
    </div>
  </div>

  <!-- RUN -->
  <div class="run-bar">
    <button class="run-btn" id="run-btn" onclick="runComparison()" disabled>
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M3 2.5L13 8L3 13.5V2.5Z" fill="currentColor"/></svg>
      Compare Models
    </button>
  </div>

  <!-- PROGRESS -->
  <div class="progress-bar" id="prog-bar"><div class="progress-fill" id="prog-fill"></div></div>

  <!-- RESULTS (hidden until run) -->
  <div id="results" style="display:none;margin-top:24px;">

    <!-- KPI STRIP -->
    <div class="kpi-strip" id="kpi-strip"></div>

    <!-- TABS -->
    <div class="tabs">
      <button class="tab active" onclick="switchTab('overview')" id="tab-overview">Overview</button>
      <button class="tab" onclick="switchTab('modules')" id="tab-modules">Modules <span class="tab-count" id="tc-modules">0</span></button>
      <button class="tab" onclick="switchTab('lineitems')" id="tab-lineitems">Line Items <span class="tab-count" id="tc-lineitems">0</span></button>
      <button class="tab" onclick="switchTab('versions')" id="tab-versions">Versions & Time</button>
      <button class="tab" onclick="switchTab('impact')" id="tab-impact">Size Impact</button>
    </div>

    <!-- TAB PANELS -->
    <div id="panel-overview"></div>
    <div id="panel-modules" style="display:none;"></div>
    <div id="panel-lineitems" style="display:none;"></div>
    <div id="panel-versions" style="display:none;"></div>
    <div id="panel-impact" style="display:none;"></div>

  </div>

</div>

<script>
// ── CONSTANTS ──────────────────────────────────────────────────────────────
const GB=1073741824;
const TIERS=[
  {l:'XL',min:50e6},{l:'Large',min:10e6},{l:'Medium',min:1e6},{l:'Small',min:0}
];
const TK_TP_MAP={
  'Month|Current Year':12,'Month|Model Calendar':36,'Month|Next Year':12,
  'Month|ADP - Next Year':12,'Month|ADP - Current Year':12,'Month|ADP - Model Calender':36,
  'Month|CY+NY':24,'Month|ADP - CY+NY':24,'Month|Following Year':12,
  'Quarter|Current Year':4,'Quarter|ADP - Current Year':4,'Quarter|ADP - Model Calender':12,
  'Year|Current Year':1,'Not Applicable|Not Applicable':1
};

// ── STATE ──────────────────────────────────────────────────────────────────
let wbA=null,wbB=null,dataA=null,dataB=null;
let modPage=0,liPage=0;
const PS=30;
let modFiltered=[],liFiltered=[];

// ── HELPERS ────────────────────────────────────────────────────────────────
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function fmtGB(n){if(n===0||n==null)return'—';if(Math.abs(n)>=1)return n.toFixed(4)+' GB';if(Math.abs(n)>=0.001)return(n*1000).toFixed(3)+' MB';return(n*1e6).toFixed(1)+' KB';}
function fmtC(n){if(n==null||n===0)return'—';const a=Math.abs(n);const s=n<0?'-':'';if(a>=1e9)return s+(a/1e9).toFixed(2)+'B';if(a>=1e6)return s+(a/1e6).toFixed(1)+'M';if(a>=1e3)return s+(a/1e3).toFixed(0)+'K';return s+Math.abs(n).toLocaleString();}
function tier(c){return TIERS.find(t=>c>=t.min)||TIERS[3];}
function tierBadge(l){return`<span class="badge badge-${l.toLowerCase()}">${l}</span>`;}
function bpc(fmt){
  if(!fmt)return 8;
  try{const o=JSON.parse(fmt),dt=(o.dataType||'').toUpperCase();if(dt==='BOOLEAN')return 1;if(['ENTITY','TIME_ENTITY','DATE','TIME','TIME_PERIOD'].includes(dt))return 4;return 8;}
  catch(e){const f=fmt.trim().toUpperCase();if(f==='BOOLEAN')return 1;if(f.includes('DATE')||f.includes('TIME')||f.includes('ENTITY'))return 4;return 8;}
}
function getTP(scale,range){const k=scale+'|'+range;if(TK_TP_MAP[k])return TK_TP_MAP[k];if(scale==='Month')return 12;if(scale==='Quarter')return 4;if(scale==='Year')return 1;return 1;}
function sign(n){return n>0?'+':'';}
function deltaClass(n){return n>0?'delta-pos':n<0?'delta-neg':'delta-zero';}
function deltaPct(a,b){if(!a||!b)return null;return((b-a)/a*100);}

// ── PARSE ─────────────────────────────────────────────────────────────────
function parseExport(ws){
  const json=XLSX.utils.sheet_to_json(ws,{defval:''});
  let curMod='(no module)',curML=[],curTS='Not Applicable',curTR='Not Applicable',curV='Not Applicable';
  const lineItems=[];
  json.forEach(row=>{
    const fmt=String(row['Format']||'').trim();
    const frm=String(row['Formula']||'').trim();
    const sm=String(row['Summary']||'').trim();
    if(fmt===''&&frm===''&&sm===''){
      const mn=String(row['Line item names']||'').trim();
      if(mn)curMod=mn;
      const hat=String(row['Applies To']||'').trim();
      curML=(hat&&hat!=='-')?hat.split(',').map(s=>s.trim()).filter(Boolean):[];
      curTS=String(row['Time Scale']||'Not Applicable').trim();
      curTR=String(row['Time Range']||'Not Applicable').trim();
      curV=String(row['Versions']||'Not Applicable').trim();
      return;
    }
    const cc=parseFloat(String(row['Cell Count']||'').replace(/,/g,''))||0;
    const b=bpc(fmt);
    const modName=String(row['Module Name']||'').trim()||curMod;
    const rawAt=String(row['Applies To']||'').trim();
    const lists=rawAt==='-'?curML.slice():rawAt===''?[]:rawAt.split(',').map(s=>s.trim()).filter(Boolean);
    const rawTS=String(row['Time Scale']||'').trim();
    const rawTR=String(row['Time Range']||'').trim();
    const rawV=String(row['Versions']||'').trim();
    const timeScale=(rawTS&&rawTS!=='-')?rawTS:curTS;
    const timeRange=(rawTR&&rawTR!=='-')?rawTR:curTR;
    const versions=(rawV&&rawV!=='-')?rawV:curV;
    const versionCount=(versions==='All')?2:1;
    const timePeriods=getTP(timeScale,timeRange);
    lineItems.push({
      name:String(row['Line item names']||'').trim(),
      module:modName,
      format:fmt,formula:frm,
      lists,timeScale,timeRange,versions,versionCount,timePeriods,
      cellCount:cc,gb:(cc*b)/GB,bpc:b,tier:tier(cc)
    });
  });
  // Aggregate modules
  const mods={};
  lineItems.forEach(r=>{
    if(!mods[r.module])mods[r.module]={cells:0,gb:0,items:0,listsSet:new Set(),versions:new Set(),timeScales:new Set()};
    mods[r.module].cells+=r.cellCount;
    mods[r.module].gb+=r.gb;
    mods[r.module].items++;
    r.lists.forEach(l=>mods[r.module].listsSet.add(l));
    mods[r.module].versions.add(r.versions);
    mods[r.module].timeScales.add(r.timeScale);
  });
  const modules=Object.entries(mods).map(([name,d])=>({
    name,cells:d.cells,gb:d.gb,items:d.items,
    lists:Array.from(d.listsSet),
    versions:Array.from(d.versions).join(', '),
    timeScales:Array.from(d.timeScales).join(', '),
    tier:tier(d.cells)
  }));
  return{lineItems,modules,
    totalGB:lineItems.reduce((s,r)=>s+r.gb,0),
    totalCells:lineItems.reduce((s,r)=>s+r.cellCount,0)
  };
}

// ── PREFIX STRIPPING ───────────────────────────────────────────────────────
// Strips leading numeric prefixes like "01_", "02_", "1.", "01 - ", "1 " etc.
function stripPrefix(name){
  return String(name||'').replace(/^\d+[\s_\-\.]+/,'').trim();
}

// ── DIFF ENGINE ────────────────────────────────────────────────────────────
function diffMaps(aList,bList,keyFn){
  const aMap=new Map(aList.map(x=>[keyFn(x),x]));
  const bMap=new Map(bList.map(x=>[keyFn(x),x]));
  const all=new Set([...aMap.keys(),...bMap.keys()]);
  const rows=[];
  all.forEach(k=>{
    const a=aMap.get(k),b=bMap.get(k);
    let status='same';
    if(!a)status='added';
    else if(!b)status='removed';
    else if(JSON.stringify({c:a.cells,f:a.formula,ts:a.timeScale,v:a.versions})!==JSON.stringify({c:b.cells,f:b.formula,ts:b.timeScale,v:b.versions}))status='changed';
    rows.push({key:k,a,b,status});
  });
  return rows.sort((x,y)=>{const o={removed:0,changed:1,added:2,same:3};return o[x.status]-o[y.status];});
}

// ── FILE HANDLERS ──────────────────────────────────────────────────────────
function handleFile(which,file){
  const reader=new FileReader();
  reader.onload=ev=>{
    try{
      const wb=XLSX.read(new Uint8Array(ev.target.result),{type:'array'});
      if(which==='a'){wbA=wb;}else{wbB=wb;}
      const sel=document.getElementById('sheet-'+which);
      sel.innerHTML=wb.SheetNames.map((n,i)=>`<option value="${i}">${esc(n)}</option>`).join('');
      sel.style.display='block';
      const card=document.getElementById('card-'+which);
      card.className='upload-card '+(which==='a'?'loaded':'loaded-b');
      const chip=document.getElementById('chip-'+which);
      chip.innerHTML=`<span class="file-chip chip-${which}"><span class="chip-dot" style="background:${which==='a'?'var(--accent2)':'var(--green)'}"></span>${esc(file.name)}</span>`;
      chip.style.display='block';
      // Quick meta preview
      const ws=wb.Sheets[wb.SheetNames[0]];
      const json=XLSX.utils.sheet_to_json(ws,{defval:''});
      const rowCount=json.length;
      document.getElementById('meta-'+which).innerHTML=`<div class="meta-row"><span>Sheets</span><span>${wb.SheetNames.length}</span></div><div class="meta-row"><span>Rows</span><span>${rowCount.toLocaleString()}</span></div>`;
      document.getElementById('meta-'+which).style.display='flex';
      // Enable run if both loaded
      if(wbA&&wbB)document.getElementById('run-btn').disabled=false;
    }catch(err){alert('Could not parse: '+err.message);}
  };
  reader.readAsArrayBuffer(file);
}

document.getElementById('file-a').addEventListener('change',e=>{const f=e.target.files&&e.target.files[0];if(f)handleFile('a',f);});
document.getElementById('file-b').addEventListener('change',e=>{const f=e.target.files&&e.target.files[0];if(f)handleFile('b',f);});

// ── RUN ────────────────────────────────────────────────────────────────────
function setProgress(p){document.getElementById('prog-fill').style.width=p+'%';}

function runComparison(){
  if(!wbA||!wbB)return;
  setProgress(10);
  setTimeout(()=>{
    const idxA=parseInt(document.getElementById('sheet-a').value)||0;
    const idxB=parseInt(document.getElementById('sheet-b').value)||0;
    setProgress(30);
    dataA=parseExport(wbA.Sheets[wbA.SheetNames[idxA]]);
    setProgress(55);
    dataB=parseExport(wbB.Sheets[wbB.SheetNames[idxB]]);
    setProgress(80);
    renderAll();
    setProgress(100);
    setTimeout(()=>setProgress(0),600);
    document.getElementById('results').style.display='block';
    document.getElementById('results').scrollIntoView({behavior:'smooth',block:'start'});
  },60);
}

// ── RENDER ALL ─────────────────────────────────────────────────────────────
function renderAll(){
  renderKPIs();
  renderOverview();
  renderModules();
  renderLineItems();
  renderVersions();
  renderImpact();
}

// ── KPIs ───────────────────────────────────────────────────────────────────
function renderKPIs(){
  const deltaGB=dataB.totalGB-dataA.totalGB;
  const deltaCells=dataB.totalCells-dataA.totalCells;
  const modDiff=diffMaps(dataA.modules,dataB.modules,x=>stripPrefix(x.name));
  const liDiff=diffMaps(dataA.lineItems,dataB.lineItems,x=>stripPrefix(x.module)+'::'+stripPrefix(x.name));
  const added=liDiff.filter(x=>x.status==='added').length;
  const removed=liDiff.filter(x=>x.status==='removed').length;
  const changed=liDiff.filter(x=>x.status==='changed').length;
  document.getElementById('kpi-strip').innerHTML=`
    <div class="kpi-card"><div class="kpi-label">Size Delta</div><div class="kpi-val ${deltaGB>=0?'green':'red'}">${sign(deltaGB)}${fmtGB(Math.abs(deltaGB))}</div><div class="kpi-sub">${sign(deltaGB)}${fmtC(Math.abs(deltaCells))} cells</div></div>
    <div class="kpi-card"><div class="kpi-label">Model A Size</div><div class="kpi-val blue">${fmtGB(dataA.totalGB)}</div><div class="kpi-sub">${fmtC(dataA.totalCells)} cells</div></div>
    <div class="kpi-card"><div class="kpi-label">Model B Size</div><div class="kpi-val green">${fmtGB(dataB.totalGB)}</div><div class="kpi-sub">${fmtC(dataB.totalCells)} cells</div></div>
    <div class="kpi-card"><div class="kpi-label">Line Items</div><div class="kpi-val amber">${added} added · ${removed} removed</div><div class="kpi-sub">${changed} changed</div></div>
    <div class="kpi-card"><div class="kpi-label">Modules</div><div class="kpi-val purple">${modDiff.filter(x=>x.status==='added').length} added · ${modDiff.filter(x=>x.status==='removed').length} removed</div><div class="kpi-sub">${modDiff.filter(x=>x.status==='changed').length} changed</div></div>
  `;
}

// ── OVERVIEW ───────────────────────────────────────────────────────────────

  // Top 20 by max GB for chart
  const chartData=modDiff.filter(x=>x.status!=='same'||((x.a?x.a.gb:0)>0||(x.b?x.b.gb:0)>0))
    .sort((a,b)=>Math.max(b.a?b.a.gb:0,b.b?b.b.gb:0)-Math.max(a.a?a.a.gb:0,a.b?a.b.gb:0))

  const chartRows=chartData.map(x=>{
    const aGB=x.a?x.a.gb:0, bGB=x.b?x.b.gb:0;
    const aPct=Math.max((aGB/maxGB*100),0), bPct=Math.max((bGB/maxGB*100),0);
    const delta=bGB-aGB;
    const dc=deltaClass(delta);
    return`<div class="bc-row">
      <div class="bc-label" title="${esc(x.key)}">${esc(x.key.length>28?x.key.slice(0,28)+'…':x.key)}</div>
      <div class="bc-bars">
        <div class="bc-bar bc-bar-a" style="width:${aPct.toFixed(2)}%"></div>
        <div class="bc-bar bc-bar-b" style="width:${bPct.toFixed(2)}%"></div>
      </div>
      <div class="bc-val">
        <div style="color:var(--accent2);font-family:var(--font-mono);font-size:9px;">${fmtGB(aGB)}</div>
        <div style="color:var(--green);font-family:var(--font-mono);font-size:9px;">${fmtGB(bGB)}</div>
      </div>
      <div style="width:70px;font-family:var(--font-mono);font-size:9px;" class="${dc}">${sign(delta)}${fmtGB(Math.abs(delta))}</div>
    </div>`;
  }).join('');

  // Summary stats
  const liDiff=diffMaps(dataA.lineItems,dataB.lineItems,x=>stripPrefix(x.module)+'::'+stripPrefix(x.name));
  const addedLI=liDiff.filter(x=>x.status==='added');
  const removedLI=liDiff.filter(x=>x.status==='removed');
  const changedLI=liDiff.filter(x=>x.status==='changed');
  const addedGB=addedLI.reduce((s,x)=>s+(x.b?x.b.gb:0),0);
  const removedGB=removedLI.reduce((s,x)=>s+(x.a?x.a.gb:0),0);
  const netDelta=dataB.totalGB-dataA.totalGB;
  const pctChange=dataA.totalGB>0?((netDelta/dataA.totalGB)*100):0;

  // ── Helpers ────────────────────────────────────────────────────────────
  const TH='padding:9px 14px;font-family:var(--font-mono);font-size:9px;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);border-bottom:1px solid var(--border);background:var(--surface2);white-space:nowrap;text-align:left;position:sticky;top:0;z-index:1;';
  const THR=TH+'text-align:right;';
  const TD='padding:8px 14px;border-bottom:1px solid var(--border);vertical-align:middle;font-size:11px;';
  const TDR=TD+'text-align:right;font-family:var(--font-mono);font-size:10px;';
  const TDM=TD+'font-family:var(--font-mono);font-size:10px;';

  function pill(val,bg,tc){
    if(!val||val===''||val==='Not Applicable'||val==='-')return'<span style="color:var(--muted2);font-family:var(--font-mono);font-size:10px;">—</span>';
    return`<span style="display:inline-block;font-family:var(--font-mono);font-size:10px;padding:2px 8px;border-radius:4px;background:${bg};color:${tc};border:1px solid ${tc}33;white-space:nowrap;">${esc(val)}</span>`;
  }
  function diffCell(aVal,bVal,aBg,aTc,bBg,bTc){
    if(!aVal&&!bVal)return'<span style="color:var(--muted2);font-family:var(--font-mono);font-size:10px;">—</span>';
    if(!bVal)return pill(aVal,aBg,aTc); // only in A (removed)
    if(!aVal)return pill(bVal,bBg,bTc); // only in B (added)
    if(aVal===bVal)return pill(aVal,aBg,aTc); // same — show once in A colour
    // changed — show A strikethrough + arrow + B
    return`<div style="display:flex;align-items:center;gap:5px;flex-wrap:wrap;">
      <span style="font-family:var(--font-mono);font-size:10px;padding:2px 8px;border-radius:4px;background:${aBg};color:${aTc};border:1px solid ${aTc}33;text-decoration:line-through;opacity:.7;">${esc(aVal)}</span>
      <span style="color:var(--muted2);font-size:10px;">→</span>
      <span style="font-family:var(--font-mono);font-size:10px;padding:2px 8px;border-radius:4px;background:${bBg};color:${bTc};border:1px solid ${bTc}33;">${esc(bVal)}</span>
    </div>`;
  }
  function listDiffCell(aLists,bLists){
    const aSet=new Set(aLists||[]), bSet=new Set(bLists||[]);

    if(!all.length)return'<span style="color:var(--muted2);font-family:var(--font-mono);font-size:10px;">—</span>';
    return all.map(l=>{
      const inA=aSet.has(l), inB=bSet.has(l);
      if(inA&&inB) return`<span style="display:inline-block;font-family:var(--font-mono);font-size:10px;padding:2px 7px;border-radius:4px;background:rgba(167,139,250,0.1);color:#a78bfa;border:1px solid rgba(167,139,250,0.25);margin:1px 2px;white-space:nowrap;">${esc(l)}</span>`;

    }).join('');
  }

  // Aggregate unique dims from line items per module
  function getModuleDims(lineItems,modName){
    const items=lineItems.filter(li=>stripPrefix(li.module)===stripPrefix(modName));
    return{
      versions:Array.from(new Set(items.map(li=>li.versions).filter(v=>v&&v!=='Not Applicable'))).join(', ')||'',

      timeRange:Array.from(new Set(items.map(li=>li.timeRange).filter(v=>v&&v!=='Not Applicable'))).join(', ')||'',

  // ── Overview dimension table rows (one row per module) ─────────────────
  const ovRows=modDiff.map(x=>{

    const delta=bGB-aGB;
    const deltaCells=dB.cells-dA.cells;
    const displayName=x.key||(aName||bName);

    // combined time: "Scale · Range"
    const aTime=[dA.timeScale,dA.timeRange].filter(Boolean).join(' · ')||'';

      <td style="${TD}font-weight:600;max-width:170px;">

      </td>
      <td style="${TD}"><span class="badge badge-${x.status}">${x.status}</span></td>
      <td style="${TDR}">
        <div style="color:var(--accent2);">${fmtGB(aGB)}</div>
        <div style="color:var(--green);margin-top:2px;">${fmtGB(bGB)}</div>
      </td>
      <td style="${TDR}"><span class="${deltaClass(delta)}">${delta===0?'—':sign(delta)+fmtGB(Math.abs(delta))}</span></td>
      <td style="${TDR}">
        <div style="color:var(--accent2);">${fmtC(dA.cells)||'—'}</div>
        <div style="color:var(--green);margin-top:2px;">${fmtC(dB.cells)||'—'}</div>
        ${deltaCells!==0?`<div class="${deltaClass(deltaCells)}" style="margin-top:2px;font-size:9px;">${sign(deltaCells)}${fmtC(Math.abs(deltaCells))}</div>`:''}
      </td>

      <td style="${TD}max-width:200px;">${diffCell(aTime,bTime,'rgba(59,130,246,0.1)','#60a5fa','rgba(34,211,164,0.1)','#22d3a4')}</td>
    </tr>`;
  }).join('');

  document.getElementById('panel-overview').innerHTML=`

          <span style="display:inline-flex;align-items:center;gap:5px;"><span style="width:10px;height:4px;border-radius:2px;background:var(--green);display:inline-block;"></span>Model B</span>
        </div>
      </div>
      <div class="chart-wrap"><div class="bar-chart">${chartRows||'<div class="empty">No module data to display</div>'}</div></div>
    </div>

    <div class="summary-grid" style="padding:0;display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:20px;">
      <div class="sum-card">
        <div class="sum-card-title">Size Summary</div>
        <div class="sum-row"><span class="sum-row-label">Model A Total</span><span class="sum-row-val" style="color:var(--accent2);">${fmtGB(dataA.totalGB)}</span></div>
        <div class="sum-row"><span class="sum-row-label">Model B Total</span><span class="sum-row-val" style="color:var(--green);">${fmtGB(dataB.totalGB)}</span></div>
        <div class="sum-row"><span class="sum-row-label">Net Delta</span><span class="sum-row-val ${deltaClass(netDelta)}">${sign(netDelta)}${fmtGB(Math.abs(netDelta))}</span></div>
        <div class="sum-row"><span class="sum-row-label">% Change</span><span class="sum-row-val ${deltaClass(pctChange)}">${sign(pctChange)}${pctChange.toFixed(2)}%</span></div>
      </div>

        <div class="sum-card-title">Line Items</div>
        <div class="sum-row"><span class="sum-row-label">Model A</span><span class="sum-row-val" style="color:var(--accent2);">${dataA.lineItems.length.toLocaleString()}</span></div>
        <div class="sum-row"><span class="sum-row-label">Model B</span><span class="sum-row-val" style="color:var(--green);">${dataB.lineItems.length.toLocaleString()}</span></div>
        <div class="sum-row"><span class="sum-row-label">Added</span><span class="sum-row-val" style="color:var(--green);">+${addedLI.length}</span></div>
        <div class="sum-row"><span class="sum-row-label">Removed</span><span class="sum-row-val" style="color:var(--red);">-${removedLI.length}</span></div>
        <div class="sum-row"><span class="sum-row-label">Changed</span><span class="sum-row-val" style="color:var(--amber);">${changedLI.length}</span></div>
      </div>
      <div class="sum-card">
        <div class="sum-card-title">Size Impact</div>

// ── MODULES ────────────────────────────────────────────────────────────────
function renderModules(){
  const diff=diffMaps(dataA.modules,dataB.modules,x=>stripPrefix(x.name));
  document.getElementById('tc-modules').textContent=diff.filter(x=>x.status!=='same').length;
  modFiltered=diff;
  buildModuleTable();
}

function filterModules(){
  const st=document.getElementById('mf-status').value;
  const q=(document.getElementById('mf-search').value||'').toLowerCase();
  const diff=diffMaps(dataA.modules,dataB.modules,x=>stripPrefix(x.name));
  modFiltered=diff.filter(x=>{
    if(st!=='all'&&x.status!==st)return false;
    if(q&&!x.key.toLowerCase().includes(q))return false;
    return true;
  });
  modPage=0;buildModuleTable();
}

function buildModuleTable(){
  const TD='padding:9px 14px;border-bottom:1px solid var(--border);vertical-align:middle;';
  const TDR=TD+'text-align:right;';
  const s=modPage*PS,e=Math.min(s+PS,modFiltered.length);
  const rows=modFiltered.slice(s,e).map(x=>{
    const aGB=x.a?x.a.gb:0,bGB=x.b?x.b.gb:0;
    const delta=bGB-aGB;
    const aCells=x.a?x.a.cells:0,bCells=x.b?x.b.cells:0;
    const deltaCells=bCells-aCells;
    const aItems=x.a?x.a.items:0,bItems=x.b?x.b.items:0;
    const deltaItems=bItems-aItems;
    const aVer=x.a?x.a.versions:'—', bVer=x.b?x.b.versions:'—';
    const verChanged=x.a&&x.b&&aVer!==bVer;
    const aTS=x.a?x.a.timeScales:'—', bTS=x.b?x.b.timeScales:'—';
    return`<tr class="row-${x.status}">
      <td style="${TD}font-weight:500;" title="${esc(x.key)}">${esc(x.key.length>30?x.key.slice(0,30)+'…':x.key)}</td>
      <td style="${TD}"><span class="badge badge-${x.status}">${x.status}</span></td>
      <td style="${TDR}"><span style="color:var(--accent2);font-family:var(--font-mono);font-size:11px;">${fmtGB(aGB)}</span></td>
      <td style="${TDR}"><span style="color:var(--green);font-family:var(--font-mono);font-size:11px;">${fmtGB(bGB)}</span></td>
      <td style="${TDR}"><span class="${deltaClass(delta)}">${delta===0?'—':sign(delta)+fmtGB(Math.abs(delta))}</span></td>
      <td style="${TDR}"><span class="${deltaClass(deltaCells)}">${deltaCells===0?'—':sign(deltaCells)+fmtC(Math.abs(deltaCells))}</span></td>
      <td style="${TDR}"><span class="${deltaClass(deltaItems)}" style="font-family:var(--font-mono);font-size:11px;">${deltaItems===0?'—':sign(deltaItems)+deltaItems}</span></td>
      <td style="${TD}"><span style="font-family:var(--font-mono);font-size:10px;${verChanged?'color:var(--amber);':''}">${esc(aVer)} → ${esc(bVer)}</span></td>
      <td style="${TD}font-family:var(--font-mono);font-size:10px;color:var(--muted);" title="${esc(aTS)} → ${esc(bTS)}">${esc((aTS||'').length>20?(aTS||'').slice(0,20)+'…':(aTS||''))} → ${esc((bTS||'').length>20?(bTS||'').slice(0,20)+'…':(bTS||''))}</td>
    </tr>`;
  }).join('');

  document.getElementById('panel-modules').innerHTML=`
    <div class="section">
      <div class="sec-header"><div class="sec-title">Module Comparison</div><div class="sec-meta">${modFiltered.length} modules</div></div>
      <div class="filter-bar">
        <select class="filter-sel" id="mf-status" onchange="filterModules()">
          <option value="all">All statuses</option>
          <option value="added">Added</option>
          <option value="removed">Removed</option>
          <option value="changed">Changed</option>
          <option value="same">Unchanged</option>
        </select>
        <input class="filter-input" id="mf-search" placeholder="Search module..." oninput="filterModules()">
      </div>
      <div style="overflow-x:auto;">
        <table class="diff-table">
          <thead><tr>
            <th>MODULE</th><th>STATUS</th>
            <th class="right">MODEL A (GB)</th><th class="right">MODEL B (GB)</th><th class="right">Δ SIZE</th>
            <th class="right">Δ CELLS</th><th class="right">Δ ITEMS</th>
            <th>VERSIONS</th><th>TIME SCALE</th>
          </tr></thead>
          <tbody>${rows||'<tr><td colspan="9" style="padding:20px;text-align:center;color:var(--muted2);font-family:var(--font-mono);font-size:12px;">No modules match filter</td></tr>'}</tbody>
        </table>
      </div>
      <div class="pg-bar">
        <button class="pg-btn" onclick="modPg(-1)" ${modPage===0?'disabled':''}>← Prev</button>
        <span>${s+1}–${e} of ${modFiltered.length}</span>
        <button class="pg-btn" onclick="modPg(1)" ${e>=modFiltered.length?'disabled':''}>Next →</button>
      </div>
      <div class="legend">
        <span class="leg-item"><span class="leg-dot" style="background:var(--green)"></span>Added</span>
        <span class="leg-item"><span class="leg-dot" style="background:var(--red)"></span>Removed</span>
        <span class="leg-item"><span class="leg-dot" style="background:var(--amber)"></span>Changed</span>
        <span class="leg-item"><span class="leg-dot" style="background:var(--border2)"></span>Unchanged</span>
      </div>
    </div>`;
}
function modPg(d){modPage+=d;buildModuleTable();}

  liFiltered=diff;

  document.getElementById('panel-lineitems').innerHTML=`
    <div class="section">

          <option value="same">Unchanged</option>

          ${allMods.map(m=>`<option value="${esc(m)}">${esc(m)}</option>`).join('')}

      </div>

  buildLITable();
}

function filterLI(){
  const st=document.getElementById('lf-status').value;
  const mod=document.getElementById('lf-module').value;
  const q=(document.getElementById('lf-search').value||'').toLowerCase();
  const diff=diffMaps(dataA.lineItems,dataB.lineItems,x=>stripPrefix(x.module)+'::'+stripPrefix(x.name));
  liFiltered=diff.filter(x=>{
    if(st!=='all'&&x.status!==st)return false;
    const modName=x.a?x.a.module:x.b?x.b.module:'';
    if(mod&&modName!==mod)return false;
    if(q&&!x.key.toLowerCase().includes(q))return false;
    return true;
  });
  liPage=0;buildLITable();
  document.getElementById('li-count').textContent=liFiltered.length+' items';
}

function buildLITable(){
  const TD='padding:8px 12px;border-bottom:1px solid var(--border);vertical-align:middle;font-size:11px;';
  const TDR=TD+'text-align:right;';
  const s=liPage*PS,e=Math.min(s+PS,liFiltered.length);
  const rows=liFiltered.slice(s,e).map(x=>{
    const a=x.a,b=x.b;
    const aGB=a?a.gb:0,bGB=b?b.gb:0;
    const delta=bGB-aGB;
    const aCells=a?a.cellCount:0,bCells=b?b.cellCount:0;
    const deltaCells=bCells-aCells;
    const modName=a?a.module:b?b.module:'';
    const liName=a?a.name:b?b.name:'';
    const aFmt=a?a.format:'',bFmt=b?b.format:'';
    const fmtChanged=a&&b&&aFmt!==bFmt;
    const aVer=a?a.versions:'—',bVer=b?b.versions:'—';
    const verChanged=a&&b&&aVer!==bVer;
    const aTS=a?a.timeScale:'—',bTS=b?b.timeScale:'—';
    const tsChanged=a&&b&&aTS!==bTS;
    const aTR=a?a.timeRange:'—',bTR=b?b.timeRange:'—';
    const aLists=a?a.lists.join(', ') || '—':'—';
    const bLists=b?b.lists.join(', ') || '—':'—';
    const listsChanged=a&&b&&aLists!==bLists;
    const aFormula=a?a.formula:'',bFormula=b?b.formula:'';
    const formulaChanged=a&&b&&aFormula!==bFormula;
    return`<tr class="row-${x.status}">
      <td style="${TD}font-weight:500;" title="${esc(liName)}">${esc(liName.length>25?liName.slice(0,25)+'…':liName)}</td>
      <td style="${TD}color:var(--muted);" title="${esc(modName)}">${esc(modName.length>22?modName.slice(0,22)+'…':modName)}</td>
      <td style="${TD}"><span class="badge badge-${x.status}">${x.status}</span></td>
      <td style="${TDR}"><span style="color:var(--accent2);font-family:var(--font-mono);font-size:10px;">${fmtGB(aGB)}</span></td>
      <td style="${TDR}"><span style="color:var(--green);font-family:var(--font-mono);font-size:10px;">${fmtGB(bGB)}</span></td>
      <td style="${TDR}"><span class="${deltaClass(delta)}">${delta===0?'—':sign(delta)+fmtGB(Math.abs(delta))}</span></td>
      <td style="${TDR}"><span class="${deltaClass(deltaCells)}">${deltaCells===0?'—':sign(deltaCells)+fmtC(Math.abs(deltaCells))}</span></td>
      <td style="${TD}font-family:var(--font-mono);font-size:10px;${fmtChanged?'color:var(--amber);':''}">${esc(aFmt||'—')} ${fmtChanged?'→ '+esc(bFmt):''}</td>
      <td style="${TD}font-family:var(--font-mono);font-size:10px;${verChanged?'color:var(--amber);':''}">${esc(aVer)} ${verChanged?'→ '+esc(bVer):''}</td>
      <td style="${TD}font-family:var(--font-mono);font-size:10px;${tsChanged?'color:var(--amber);':''}" title="${esc(aTS+'|'+aTR)} → ${esc(bTS+'|'+bTR)}">${esc(aTS.length>12?aTS.slice(0,12)+'…':aTS)} ${tsChanged?'→ '+esc(bTS.length>12?bTS.slice(0,12)+'…':bTS):''}</td>
      <td style="${TD}font-family:var(--font-mono);font-size:10px;${listsChanged?'color:var(--amber);':''}" title="${esc(aLists)} → ${esc(bLists)}">${esc(aLists.length>20?aLists.slice(0,20)+'…':aLists)} ${listsChanged?'→ …':''}</td>
      <td style="${TD}"><span style="font-family:var(--font-mono);font-size:10px;${formulaChanged?'color:var(--amber);':'color:var(--muted2);'}">${formulaChanged?'Changed':'—'}</span></td>
    </tr>`;
  }).join('');

  document.getElementById('li-table-wrap').innerHTML=`
    <table class="diff-table">
      <thead><tr>
        <th>LINE ITEM</th><th>MODULE</th><th>STATUS</th>
        <th class="right">A (GB)</th><th class="right">B (GB)</th><th class="right">Δ SIZE</th><th class="right">Δ CELLS</th>
        <th>FORMAT</th><th>VERSIONS</th><th>TIME SCALE</th><th>LISTS</th><th>FORMULA</th>
      </tr></thead>
      <tbody>${rows||'<tr><td colspan="12" style="padding:20px;text-align:center;color:var(--muted2);font-family:var(--font-mono);font-size:12px;">No items match filter</td></tr>'}</tbody>
    </table>`;
  document.getElementById('li-pg').innerHTML=`
    <button class="pg-btn" onclick="liPg(-1)" ${liPage===0?'disabled':''}>← Prev</button>
    <span>${s+1}–${e} of ${liFiltered.length}</span>
    <button class="pg-btn" onclick="liPg(1)" ${e>=liFiltered.length?'disabled':''}>Next →</button>`;
}
function liPg(d){liPage+=d;buildLITable();}

// ── VERSIONS & TIME ────────────────────────────────────────────────────────
function renderVersions(){
  // Build a combined comparison of version + time scale + time range per line item
  const diff=diffMaps(dataA.lineItems,dataB.lineItems,x=>stripPrefix(x.module)+'::'+stripPrefix(x.name));
  const verChanged=diff.filter(x=>{
    if(!x.a||!x.b)return false;
    return x.a.versions!==x.b.versions||x.a.timeScale!==x.b.timeScale||x.a.timeRange!==x.b.timeRange||x.a.versionCount!==x.b.versionCount||x.a.timePeriods!==x.b.timePeriods;
  });

  // Version distribution
  const vDistA={},vDistB={};
  dataA.lineItems.forEach(r=>{vDistA[r.versions]=(vDistA[r.versions]||0)+1;});
  dataB.lineItems.forEach(r=>{vDistB[r.versions]=(vDistB[r.versions]||0)+1;});
  const allVers=Array.from(new Set([...Object.keys(vDistA),...Object.keys(vDistB)])).sort();
  const vRows=allVers.map(v=>`<div class="sum-row"><span class="sum-row-label">${esc(v)}</span><span class="sum-row-val" style="display:flex;gap:16px;"><span style="color:var(--accent2);">${(vDistA[v]||0)} items</span><span style="color:var(--green);">${(vDistB[v]||0)} items</span></span></div>`).join('');

  // Time scale distribution
  const tsDistA={},tsDistB={};
  dataA.lineItems.forEach(r=>{tsDistA[r.timeScale]=(tsDistA[r.timeScale]||0)+1;});
  dataB.lineItems.forEach(r=>{tsDistB[r.timeScale]=(tsDistB[r.timeScale]||0)+1;});
  const allTS=Array.from(new Set([...Object.keys(tsDistA),...Object.keys(tsDistB)])).sort();
  const tsRows=allTS.map(t=>`<div class="sum-row"><span class="sum-row-label">${esc(t)}</span><span class="sum-row-val" style="display:flex;gap:16px;"><span style="color:var(--accent2);">${(tsDistA[t]||0)}</span><span style="color:var(--green);">${(tsDistB[t]||0)}</span></span></div>`).join('');

  const TD='padding:8px 12px;border-bottom:1px solid var(--border);vertical-align:middle;font-size:11px;';
  const vmRows=verChanged.slice(0,100).map(x=>{
    const a=x.a,b=x.b;
    const verC=a.versions!==b.versions;
    const tsC=a.timeScale!==b.timeScale;
    const trC=a.timeRange!==b.timeRange;
    const vpC=a.versionCount!==b.versionCount;
    const tpC=a.timePeriods!==b.timePeriods;
    const aOld=a.versionCount*a.timePeriods,bNew=b.versionCount*b.timePeriods;
    const multDelta=bNew-aOld;
    return`<tr>
      <td style="${TD}font-weight:500;">${esc(a.name.length>25?a.name.slice(0,25)+'…':a.name)}</td>
      <td style="${TD}color:var(--muted);">${esc(a.module.length>22?a.module.slice(0,22)+'…':a.module)}</td>
      <td style="${TD}font-family:var(--font-mono);font-size:10px;${verC?'color:var(--amber);':''}">${esc(a.versions)} → ${esc(b.versions)}</td>
      <td style="${TD}font-family:var(--font-mono);font-size:10px;${vpC?'color:var(--amber);':''}">${a.versionCount} → ${b.versionCount}</td>
      <td style="${TD}font-family:var(--font-mono);font-size:10px;${tsC?'color:var(--amber);':''}">${esc(a.timeScale)} → ${esc(b.timeScale)}</td>
      <td style="${TD}font-family:var(--font-mono);font-size:10px;${trC?'color:var(--amber);':''}">${esc(a.timeRange)} → ${esc(b.timeRange)}</td>
      <td style="${TD}font-family:var(--font-mono);font-size:10px;${tpC?'color:var(--amber);':''}">${a.timePeriods} → ${b.timePeriods}</td>
      <td style="${TD}text-align:right;"><span class="${deltaClass(multDelta)}">${sign(multDelta)}${multDelta} combos</span></td>
    </tr>`;
  }).join('');

  document.getElementById('panel-versions').innerHTML=`
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px;">
      <div class="section">
        <div class="sec-header"><div class="sec-title">Versions Distribution</div></div>
        <div style="padding:16px 20px;">
          <div style="display:flex;justify-content:space-between;font-family:var(--font-mono);font-size:10px;color:var(--muted);margin-bottom:10px;"><span>Version Type</span><span style="display:flex;gap:16px;"><span style="color:var(--accent2);">Model A</span><span style="color:var(--green);">Model B</span></span></div>
          ${vRows}
        </div>
      </div>
      <div class="section">
        <div class="sec-header"><div class="sec-title">Time Scale Distribution</div></div>
        <div style="padding:16px 20px;">
          <div style="display:flex;justify-content:space-between;font-family:var(--font-mono);font-size:10px;color:var(--muted);margin-bottom:10px;"><span>Time Scale</span><span style="display:flex;gap:16px;"><span style="color:var(--accent2);">Model A</span><span style="color:var(--green);">Model B</span></span></div>
          ${tsRows}
        </div>
      </div>
    </div>
    <div class="section">
      <div class="sec-header"><div class="sec-title">Items with Version / Time Changes</div><div class="sec-meta">${verChanged.length} items changed</div></div>
      <div style="overflow-x:auto;">
        <table class="diff-table">
          <thead><tr>
            <th>LINE ITEM</th><th>MODULE</th><th>VERSIONS</th><th>VERSION COUNT</th><th>TIME SCALE</th><th>TIME RANGE</th><th>TIME PERIODS</th><th class="right">COMBO Δ</th>
          </tr></thead>
          <tbody>${vmRows||'<tr><td colspan="8" style="padding:20px;text-align:center;color:var(--muted2);font-family:var(--font-mono);font-size:12px;">No version/time changes detected</td></tr>'}</tbody>
        </table>
      </div>
    </div>
  `;
}

// ── SIZE IMPACT ────────────────────────────────────────────────────────────
function renderImpact(){
  const liDiff=diffMaps(dataA.lineItems,dataB.lineItems,x=>stripPrefix(x.module)+'::'+stripPrefix(x.name));
  const addedItems=liDiff.filter(x=>x.status==='added').map(x=>x.b).sort((a,b)=>b.gb-a.gb);
  const removedItems=liDiff.filter(x=>x.status==='removed').map(x=>x.a).sort((a,b)=>b.gb-a.gb);
  const changedItems=liDiff.filter(x=>x.status==='changed').sort((a,b)=>Math.abs((b.b.gb-b.a.gb))-Math.abs((a.b.gb-a.a.gb)));

  const addedGB=addedItems.reduce((s,x)=>s+x.gb,0);
  const removedGB=removedItems.reduce((s,x)=>s+x.gb,0);
  const changedDelta=changedItems.reduce((s,x)=>s+(x.b.gb-x.a.gb),0);
  const netDelta=dataB.totalGB-dataA.totalGB;

  const TD='padding:7px 14px;border-bottom:1px solid var(--border);font-size:11px;vertical-align:middle;';
  const TDR=TD+'text-align:right;font-family:var(--font-mono);';

  function impactTable(items,mode){
    if(!items.length)return`<tr><td colspan="5" style="padding:16px;text-align:center;color:var(--muted2);font-family:var(--font-mono);font-size:11px;">None</td></tr>`;
    return items.slice(0,30).map(item=>{
      const isChange=mode==='changed';
      const delta=isChange?(item.b.gb-item.a.gb):0;
      const cellDelta=isChange?(item.b.cellCount-item.a.cellCount):0;
      const gb=isChange?item.b.gb:item.gb;
      const cells=isChange?item.b.cellCount:item.cellCount;
      const modName=isChange?item.b.module:item.module;
      const liName=isChange?item.b.name:item.name;
      return`<tr>
        <td style="${TD}font-weight:500;" title="${esc(liName)}">${esc(liName.length>28?liName.slice(0,28)+'…':liName)}</td>
        <td style="${TD}color:var(--muted);" title="${esc(modName)}">${esc(modName.length>22?modName.slice(0,22)+'…':modName)}</td>
        <td style="${TDR}${mode==='added'?'color:var(--green);':mode==='removed'?'color:var(--red);':'color:var(--text);'}">${isChange?fmtGB(item.a.gb)+' → '+fmtGB(item.b.gb):fmtGB(gb)}</td>
        <td style="${TDR}">${isChange?fmtC(item.a.cellCount)+' → '+fmtC(item.b.cellCount):fmtC(cells)}</td>
        ${isChange?`<td style="${TDR}"><span class="${deltaClass(delta)}">${sign(delta)}${fmtGB(Math.abs(delta))}</span></td>`:''}
      </tr>`;
    }).join('');
  }

  document.getElementById('panel-impact').innerHTML=`
    <div class="section" style="margin-bottom:16px;">
      <div class="sec-header"><div class="sec-title">Net Size Impact Breakdown</div></div>
      <div style="padding:20px;display:grid;grid-template-columns:repeat(4,1fr);gap:10px;">
        <div style="background:rgba(34,211,164,.06);border:1px solid rgba(34,211,164,.2);border-radius:8px;padding:14px;"><div style="font-family:var(--font-mono);font-size:10px;color:var(--muted);margin-bottom:5px;">ADDED ITEMS</div><div style="font-family:var(--font-display);font-size:18px;font-weight:700;color:var(--green);">+${fmtGB(addedGB)}</div><div style="font-family:var(--font-mono);font-size:10px;color:var(--muted);">${addedItems.length} items</div></div>
        <div style="background:rgba(248,113,113,.06);border:1px solid rgba(248,113,113,.2);border-radius:8px;padding:14px;"><div style="font-family:var(--font-mono);font-size:10px;color:var(--muted);margin-bottom:5px;">REMOVED ITEMS</div><div style="font-family:var(--font-display);font-size:18px;font-weight:700;color:var(--red);">-${fmtGB(removedGB)}</div><div style="font-family:var(--font-mono);font-size:10px;color:var(--muted);">${removedItems.length} items</div></div>
        <div style="background:rgba(245,158,11,.06);border:1px solid rgba(245,158,11,.2);border-radius:8px;padding:14px;"><div style="font-family:var(--font-mono);font-size:10px;color:var(--muted);margin-bottom:5px;">CHANGED ITEMS Δ</div><div style="font-family:var(--font-display);font-size:18px;font-weight:700;" class="${deltaClass(changedDelta)}">${sign(changedDelta)}${fmtGB(Math.abs(changedDelta))}</div><div style="font-family:var(--font-mono);font-size:10px;color:var(--muted);">${changedItems.length} items</div></div>
        <div style="background:rgba(59,130,246,.06);border:1px solid rgba(59,130,246,.2);border-radius:8px;padding:14px;"><div style="font-family:var(--font-mono);font-size:10px;color:var(--muted);margin-bottom:5px;">NET DELTA</div><div style="font-family:var(--font-display);font-size:18px;font-weight:700;" class="${deltaClass(netDelta)}">${sign(netDelta)}${fmtGB(Math.abs(netDelta))}</div><div style="font-family:var(--font-mono);font-size:10px;color:var(--muted);">${sign(dataB.totalGB-dataA.totalGB>0?1:-1)}${Math.abs(((netDelta/dataA.totalGB)*100)).toFixed(2)}% change</div></div>
      </div>
    </div>
    <div class="impact-grid">
      <div class="impact-card">
        <div class="impact-card-head" style="border-color:rgba(34,211,164,.2);">
          <div style="width:8px;height:8px;border-radius:50%;background:var(--green);"></div>
          <div class="impact-card-title" style="color:var(--green);">NEWLY ADDED ITEMS — ${fmtGB(addedGB)}</div>
        </div>
        <div style="overflow-x:auto;"><table class="impact-table"><thead><tr><th style="padding:7px 14px;font-family:var(--font-mono);font-size:9px;color:var(--muted);border-bottom:1px solid var(--border);background:var(--surface2);">LINE ITEM</th><th style="padding:7px 14px;font-family:var(--font-mono);font-size:9px;color:var(--muted);border-bottom:1px solid var(--border);background:var(--surface2);">MODULE</th><th style="padding:7px 14px;text-align:right;font-family:var(--font-mono);font-size:9px;color:var(--muted);border-bottom:1px solid var(--border);background:var(--surface2);">SIZE</th><th style="padding:7px 14px;text-align:right;font-family:var(--font-mono);font-size:9px;color:var(--muted);border-bottom:1px solid var(--border);background:var(--surface2);">CELLS</th></tr></thead><tbody>${impactTable(addedItems,'added')}</tbody></table></div>
        <div class="impact-total"><span style="color:var(--muted2);">Total added</span><span style="color:var(--green);">+${fmtGB(addedGB)}</span></div>
      </div>
      <div class="impact-card">
        <div class="impact-card-head" style="border-color:rgba(248,113,113,.2);">
          <div style="width:8px;height:8px;border-radius:50%;background:var(--red);"></div>
          <div class="impact-card-title" style="color:var(--red);">DELETED ITEMS — ${fmtGB(removedGB)}</div>
        </div>
        <div style="overflow-x:auto;"><table class="impact-table"><thead><tr><th style="padding:7px 14px;font-family:var(--font-mono);font-size:9px;color:var(--muted);border-bottom:1px solid var(--border);background:var(--surface2);">LINE ITEM</th><th style="padding:7px 14px;font-family:var(--font-mono);font-size:9px;color:var(--muted);border-bottom:1px solid var(--border);background:var(--surface2);">MODULE</th><th style="padding:7px 14px;text-align:right;font-family:var(--font-mono);font-size:9px;color:var(--muted);border-bottom:1px solid var(--border);background:var(--surface2);">SIZE</th><th style="padding:7px 14px;text-align:right;font-family:var(--font-mono);font-size:9px;color:var(--muted);border-bottom:1px solid var(--border);background:var(--surface2);">CELLS</th></tr></thead><tbody>${impactTable(removedItems,'removed')}</tbody></table></div>
        <div class="impact-total"><span style="color:var(--muted2);">Total freed</span><span style="color:var(--red);">-${fmtGB(removedGB)}</span></div>
      </div>
    </div>
    <div class="section" style="margin-top:16px;">
      <div class="sec-header"><div class="sec-title">Changed Items — Size Delta</div><div class="sec-meta">${changedItems.length} items</div></div>
      <div style="overflow-x:auto;">
        <table class="diff-table">
          <thead><tr><th>LINE ITEM</th><th>MODULE</th><th class="right">A SIZE</th><th class="right">B SIZE</th><th class="right">Δ SIZE</th></tr></thead>
          <tbody>${impactTable(changedItems,'changed')}</tbody>
        </table>
      </div>
    </div>
  `;
}

// ── TAB SWITCH ─────────────────────────────────────────────────────────────
function switchTab(name){
  ['overview','modules','lineitems','versions','impact'].forEach(t=>{
    document.getElementById('panel-'+t).style.display=t===name?'block':'none';
    document.getElementById('tab-'+t).className='tab'+(t===name?' active':'');
  });
}
</script>
</body>
</html>
